name: peblo_story_buddy
description: "Peblo Smart Story Buddy - AI-powered storytelling companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_tts: ^4.0.2
  confetti: ^0.7.0
  flutter_animate: ^4.5.0
  shared_preferences: ^2.2.3
  lottie: ^3.1.2
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
